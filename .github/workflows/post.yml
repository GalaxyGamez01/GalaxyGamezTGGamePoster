name: Auto Post to Telegram

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poster
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python main.py

      - name: Save updated tracker files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_posts.json stats.json last_run_log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update after posting cycle"
          git push
